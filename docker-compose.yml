services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: startup
      POSTGRES_PASSWORD: startup
      POSTGRES_DB: startup_stack
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U startup -d startup_stack"]
      interval: 5s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - apps/web/.env
    environment:
      DATABASE_URL: postgresql://startup:startup@db:5432/startup_stack
      EMAIL_SERVER: smtp://mailpit:1025
      EMAIL_FROM: Startup Stack <noreply@localhost>
      APP_URL: http://localhost:3000
      SKILLS_ROOT: /app/skills
      VERIFY_MCP_SCRIPT: /app/scripts/verify-mcp.sh
    volumes:
      - ./skills:/app/skills:ro
      - ./scripts:/app/scripts:ro
    depends_on:
      db:
        condition: service_healthy
      mailpit:
        condition: service_started

  n8n:
    profiles: ["n8n"]
    image: docker.n8n.io/n8nio/n8n:latest
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://localhost:5678/
      GENERIC_TIMEZONE: UTC
    volumes:
      - n8n_data:/home/node/.n8n
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5678/healthz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

volumes:
  pgdata:
  n8n_data:
