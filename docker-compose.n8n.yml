# Local n8n for Startup Stack bootstrap
# Usage: bash scripts/setup-n8n.sh
# Or: docker compose -f docker-compose.n8n.yml up -d

services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=UTC
    volumes:
      - n8n_data:/home/node/.n8n
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5678/healthz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

volumes:
  n8n_data:
